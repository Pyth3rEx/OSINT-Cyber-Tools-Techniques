label install
    menu label ^Install
    linux /install/vmlinuz
    initrd /install/initrd.gz
    append vga=788 -- quiet

label autoinstall
    menu label ^Automated Install (repo profile)
    linux /install/vmlinuz
    initrd /install/initrd.gz
    append auto=true priority=critical vga=788 -- quiet file=/cdrom/install/preseed.cfg locale=@@BOOT_LOCALE@@ keymap=@@BOOT_KEYMAP@@ hostname=@@BOOT_HOSTNAME@@ domain=@@BOOT_DOMAIN@@
